syntax = "proto3";

option csharp_namespace = "VASbot.Gui.Protos";

package vasbot;

service BotService {
  rpc ExecuteScript (ScriptRequest) returns (stream ScriptLog);
  rpc StopScript (StopRequest) returns (StopResponse);
  rpc GetStatus (StatusRequest) returns (StatusResponse);
  rpc Ping (PingRequest) returns (PingResponse);
  rpc CheckHealth (HealthRequest) returns (HealthResponse);
  rpc NotifyFrameUpdate (FrameNotification) returns (FrameResponse);
  rpc UpdateRegions (RegionList) returns (UpdateResponse);
  rpc UpdateColorClusters (ColorClusterList) returns (UpdateResponse);
  rpc SetTargetWindow (WindowContext) returns (UpdateResponse);
  rpc StartRecording (Empty) returns (UpdateResponse);
  rpc StopRecording (Empty) returns (RecordingResponse);
  rpc ClickElement (ElementRequest) returns (UpdateResponse);
  rpc TypeIntoElement (TypeRequest) returns (UpdateResponse);
  rpc WaitWindow (WindowRequest) returns (UpdateResponse);
  rpc DetectShapes (ShapeDetectionRequest) returns (ShapeDetectionResponse);
}

message Empty {}

message ScriptRequest {
  string code = 1;
  string correlation_id = 2;
}

message ScriptLog {
  string message = 1;
  string correlation_id = 2;
}

message StopRequest {}
message StopResponse {
  bool success = 1;
}

message StatusRequest {}

message StatusResponse {
  bool is_running = 1;
}

message PingRequest {}
message PingResponse {
  int64 timestamp = 1;
}

message HealthRequest {}
message HealthResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
  }
  ServingStatus status = 1;
}

message FrameNotification {
  string memory_map_name = 1;
  int32 width = 2;
  int32 height = 3;
  int32 stride = 4;
}

message FrameResponse {
  bool acknowledged = 1;
}

message Region {
  string name = 1;
  int32 x = 2;
  int32 y = 3;
  int32 width = 4;
  int32 height = 5;
  int32 index = 6;
  string color = 7;  // Hex color string e.g. "#FF0000"
}

message RegionList {
  repeated Region regions = 1;
  int32 ref_width = 2;
  int32 ref_height = 3;
}

message ColorCluster {
  string name = 1;
  repeated string colors = 2; // Hex color strings e.g. "#FF0000"
  int32 proximity = 3;
  int32 tolerance = 4;
}

message ColorClusterList {
  repeated ColorCluster clusters = 1;
}

message WindowContext {
  uint64 hwnd = 1;
  string title = 2;
}

message ElementRequest {
  string control_type = 1;
  string identifier = 2;
  bool double_click = 3;
}

message TypeRequest {
  string identifier = 1;
  string text = 2;
  bool clear_first = 3;
}

message WindowRequest {
  string title = 1;
  float timeout = 2;
}

message UpdateResponse {
  bool success = 1;
  string message = 2;
}

message RecordingResponse {
  bool success = 1;
  string script = 2;
}

message ShapeDetectionRequest {
  string shape_type = 1; // "all", "circle", "rectangle", "grid"
  int32 min_size = 2;
  int32 max_size = 3;
}

message DetectedShape {
  string type = 1; // "circle", "rectangle", "grid_cell"
  int32 x = 2;
  int32 y = 3;
  int32 width = 4;
  int32 height = 5;
  double confidence = 6;
}

message ShapeDetectionResponse {
  repeated DetectedShape shapes = 1;
}

